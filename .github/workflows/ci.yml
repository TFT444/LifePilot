name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve Swift Package dependencies
        run: swift package resolve

      - name: Build
        run: swift build

  native-app:
    name: Native App
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DERIVED_DATA: .build/xcode-derived-data
      CI_ARTIFACTS: .build/ci
      APP_PATH: .build/xcode-derived-data/Build/Products/Debug-iphonesimulator/LifePilot.app
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Prepare diagnostics directory
        run: mkdir -p "$CI_ARTIFACTS"

      - name: Resolve Xcode package dependencies
        run: |
          set -o pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project App/LifePilot.xcodeproj \
            -scheme LifePilot \
            2>&1 | tee "$CI_ARTIFACTS/package-resolution.log"

      - name: Build native app for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project App/LifePilot.xcodeproj \
            -scheme LifePilot \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$CI_ARTIFACTS/native-build.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee "$CI_ARTIFACTS/native-build.log"

      - name: Install and launch simulator smoke test
        run: |
          set -euo pipefail

          runtime_id="$(
            xcrun simctl list runtimes --json \
              | jq -r '[.runtimes[] | select(.isAvailable and (.identifier | contains("iOS")))] | last | .identifier'
          )"
          device_type="$(
            xcrun simctl list devicetypes --json \
              | jq -r '[.devicetypes[] | select(.name == "iPhone 16")] | first | .identifier'
          )"

          if [[ -z "$runtime_id" || "$runtime_id" == "null" ]]; then
            echo "No available iOS Simulator runtime was found." >&2
            exit 1
          fi
          if [[ -z "$device_type" || "$device_type" == "null" ]]; then
            echo "The iPhone 16 Simulator device type is unavailable." >&2
            exit 1
          fi
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Built app was not found at $APP_PATH." >&2
            exit 1
          fi

          simulator_id="$(
            xcrun simctl create \
              "LifePilot CI ${GITHUB_RUN_ID}" \
              "$device_type" \
              "$runtime_id"
          )"
          cleanup() {
            xcrun simctl shutdown "$simulator_id" >/dev/null 2>&1 || true
            xcrun simctl delete "$simulator_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          xcrun simctl boot "$simulator_id"
          xcrun simctl bootstatus "$simulator_id" -b
          xcrun simctl install "$simulator_id" "$APP_PATH"

          launch_output="$(
            xcrun simctl launch \
              --terminate-running-process \
              "$simulator_id" \
              com.lifepilot.app
          )"
          echo "$launch_output" | tee "$CI_ARTIFACTS/simulator-launch.log"

          app_pid="${launch_output##*: }"
          sleep 5
          if [[ ! "$app_pid" =~ ^[0-9]+$ ]] || ! kill -0 "$app_pid" 2>/dev/null; then
            xcrun simctl spawn "$simulator_id" log show \
              --last 1m \
              --style compact \
              --predicate 'process == "LifePilot"' \
              > "$CI_ARTIFACTS/simulator-system.log" || true
            echo "LifePilot did not remain alive after launch." >&2
            exit 1
          fi

      - name: Validate unsigned Release archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project App/LifePilot.xcodeproj \
            -scheme LifePilot \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CI_ARTIFACTS/LifePilot.xcarchive" \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$CI_ARTIFACTS/native-archive.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee "$CI_ARTIFACTS/native-archive.log"

      - name: Upload native build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-app-diagnostics-${{ github.run_id }}
          path: |
            .build/ci/*.log
            .build/ci/*.xcresult
            .build/xcode-derived-data/Logs
          if-no-files-found: warn
          retention-days: 14

  status:
    name: CI Status
    if: always()
    needs: [build, native-app]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependent job failed
        if: needs.build.result != 'success' || needs.native-app.result != 'success'
        run: exit 1
