name: Request Cursor Review

# Posts a short checklist on each PR so the solo maintainer (and Cursor Bugbot)
# have a visible trigger. This workflow does NOT approve PRs — GitHub forbids
# GITHUB_TOKEN self-approvals from satisfying required reviews. Approvals come
# from Cursor Approval Agents / Automations as the `cursor` identity.
# See docs/SOLO_MAINTAINER_REVIEW.md.

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  remind:
    name: Cursor review reminder
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Comment with Bugbot / Approval Agent checklist
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Cursor review checklist (solo maintainer)',
              '',
              'This repo requires an approving review and GitHub blocks self-approval by `@TFT444`.',
              'Use Cursor Bugbot + Approval Agents so the `cursor` bot can approve when safe.',
              '',
              '### Trigger Bugbot on this PR',
              '- Comment: `cursor review` or `bugbot run`',
              '- Or wait for the automatic **Cursor Bugbot** check after enabling Bugbot in the Cursor dashboard',
              '',
              '### Approval Agents',
              '- Enable a Pull Request Approver in the Cursor dashboard (see `docs/SOLO_MAINTAINER_REVIEW.md`)',
              '- Policy: `APPROVAL_POLICY.md` · Bugbot focus: `.cursor/BUGBOT.md`',
              '',
              '### Manual break-glass (avoid for normal merges)',
              '```bash',
              'gh pr merge <number> --merge --admin',
              '```',
              '',
              '_Posted by `.github/workflows/request-cursor-review.yml`._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const already = comments.some(c =>
              c.user &&
              c.body &&
              c.body.includes('Cursor review checklist (solo maintainer)')
            );
            if (already) {
              core.info('Checklist comment already present; skipping');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
