included:
  - Core
  - Agents
  - DesignSystem
  - GhostBrain
  - Mocks
  - Features
  - Services
  - AppShell
  - App
  - Tests

excluded:
  - .build
  - packages

line_length:
  warning: 120
  error: 160

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    # Matches SwiftUI's own .shadow(x:y:) parameter names in ShadowStyle.
    - x
    - y

opt_in_rules:
  - empty_count
  - force_unwrapping
  - redundant_type_annotation

disabled_rules:
  - todo
  # SwiftFormat's --wrapcollections before-first style (see .swiftformat)
  # deliberately produces trailing commas on wrapped collection literals
  # for diff cleanliness. Disabled here so the two tools don't fight.
  - trailing_comma
